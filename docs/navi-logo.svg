<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2" />
      <stop offset="100%" style="stop-color:#fcb69f" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sparkles -->
  <circle cx="40" cy="50" r="3" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="60" r="2" fill="#fff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="140" r="2.5" fill="#fff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="150" r="2" fill="#fff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Left Wing -->
  <ellipse cx="70" cy="95" rx="35" ry="50" fill="url(#wingGradient)" filter="url(#glow)" transform="rotate(-20 70 95)">
    <animate attributeName="rx" values="35;32;35" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Right Wing -->
  <ellipse cx="130" cy="95" rx="35" ry="50" fill="url(#wingGradient)" filter="url(#glow)" transform="rotate(20 130 95)">
    <animate attributeName="rx" values="35;32;35" dur="0.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="20" ry="35" fill="url(#bodyGradient)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="22" fill="url(#bodyGradient)"/>
  
  <!-- Eyes -->
  <ellipse cx="92" cy="68" rx="5" ry="6" fill="#333"/>
  <ellipse cx="108" cy="68" rx="5" ry="6" fill="#333"/>
  <circle cx="94" cy="66" r="2" fill="#fff"/>
  <circle cx="110" cy="66" r="2" fill="#fff"/>
  
  <!-- Smile -->
  <path d="M 92 78 Q 100 85 108 78" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <path d="M 90 50 Q 85 35 80 30" stroke="#fcb69f" stroke-width="2" fill="none"/>
  <circle cx="80" cy="30" r="4" fill="#a8edea"/>
  <path d="M 110 50 Q 115 35 120 30" stroke="#fcb69f" stroke-width="2" fill="none"/>
  <circle cx="120" cy="30" r="4" fill="#fed6e3"/>
  
  <!-- Glow aura -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#wingGradient)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="70;75;70" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
